services:
  prophetic-front:
    image: prophetic/prophetic-front:latest
    container_name: prophetic-front-${NEXT_PUBLIC_APP_ENV}-${NEXT_PUBLIC_SPECIALITY}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SPECIALITY: ${NEXT_PUBLIC_SPECIALITY}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV}
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Auth environment variables
      - AUTH_SECRET=${AUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      # Supabase environment variables
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Prophetic API (Perplexity + Claude)
      - PROPHETIC_API_URL=${PROPHETIC_API_URL}
      - PROPHETIC_API_TOKEN=${PROPHETIC_API_TOKEN}
      # Environment-based access control (admin-only for staging/preprod)
      - NEXT_PUBLIC_APP_ENV=${NEXT_PUBLIC_APP_ENV}
      - ENVIRONNEMENT=${ENVIRONNEMENT}
      - NEXT_PUBLIC_PRODUCTION_URL=${NEXT_PUBLIC_PRODUCTION_URL}
      - DEV_MODE=${DEV_MODE}
      - NEXT_PUBLIC_SPECIALITY=${NEXT_PUBLIC_SPECIALITY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_INTELLIGENCE_PRICE_ID=${STRIPE_INTELLIGENCE_PRICE_ID}
      - STRIPE_ORACLE_PRICE_ID=${STRIPE_ORACLE_PRICE_ID}
      - STRIPE_FLASH_PRICE_ID=${STRIPE_FLASH_PRICE_ID}
      - STRIPE_DISCOVER_PRICE_ID=${STRIPE_DISCOVER_PRICE_ID}
      - CREDITS_COST_MULTIPLIER=${CREDITS_COST_MULTIPLIER}
      # SigNoz OpenTelemetry
      - OTEL_SERVICE_NAME=prophetic-front-${NEXT_PUBLIC_APP_ENV}-${NEXT_PUBLIC_SPECIALITY}
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
    restart: unless-stopped
    networks:
      - prophetic-network

networks:
  prophetic-network:
    driver: bridge
