services:
  prophetic-front:
    image: prophetic/prophetic-front:latest
    container_name: prophetic-front-${NEXT_PUBLIC_APP_ENV}-${NEXT_PUBLIC_SPECIALITY}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SPECIALITY: ${NEXT_PUBLIC_SPECIALITY}
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Auth environment variables
      - AUTH_SECRET=${AUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      # Supabase environment variables
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Prophetic API (Perplexity + Claude)
      - PROPHETIC_API_URL=${PROPHETIC_API_URL}
      - PROPHETIC_API_TOKEN=${PROPHETIC_API_TOKEN}
      # Legacy OpenRouter API (no longer used)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Environment-based access control (admin-only for staging/preprod)
      - NEXT_PUBLIC_APP_ENV=${NEXT_PUBLIC_APP_ENV}
      - NEXT_PUBLIC_PRODUCTION_URL=${NEXT_PUBLIC_PRODUCTION_URL}
      - DEV_MODE=${DEV_MODE}
      - NEXT_PUBLIC_SPECIALITY=${NEXT_PUBLIC_SPECIALITY}
      # Polar.sh payments
      - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}
      - POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET}
      - POLAR_SUCCESS_URL=${POLAR_SUCCESS_URL}
      - POLAR_DISCOVER_ID=${POLAR_DISCOVER_ID}
      - POLAR_INTELLIGENCE_ID=${POLAR_INTELLIGENCE_ID}
      - POLAR_ORACLE_ID=${POLAR_ORACLE_ID}

    restart: unless-stopped
    networks:
      - prophetic-network

networks:
  prophetic-network:
    driver: bridge
