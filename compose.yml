services:
  prophetic-front:
    build:
      context: .
      dockerfile: Dockerfile.local
      target: dev
    container_name: prophetic-front-local
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - prophetic-network

networks:
  prophetic-network:
    external: true

volumes:
  node_modules:
  next_cache:
